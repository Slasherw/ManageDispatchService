AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12

Resources:
  # 1. DynamoDB Table
  ManageDispatchTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ManageDispatchTable
      AttributeDefinitions:
        - AttributeName: dispatchId
          AttributeType: S
        - AttributeName: teamId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: dispatchId
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      GlobalSecondaryIndexes:
        - IndexName: TeamIdIndex
          KeySchema:
            - AttributeName: teamId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5

  # 2. SQS Queue
  DispatchCommandsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: dispatch-commands-v1

  DispatchCommandsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref DispatchCommandsQueue
      PolicyDocument:
        Id: "SnsToSqsPolicy"
        Version: "2012-10-17"
        Statement:
          - Sid: "Allow-SNS-SendMessage"
            Effect: "Allow"
            Principal:
              Service: "sns.amazonaws.com"
            Action: "sqs:SendMessage"
            Resource: !GetAtt DispatchCommandsQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: "arn:aws:sns:us-east-1:955468203539:rescue-prioritization-events-v1"

  # ส่วนสำหรับเชื่อมต่อ (Subscribe) SQS ของเราเข้ากับ SNS ของเพื่อน
  RescuePrioritizationSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      Endpoint: !GetAtt DispatchCommandsQueue.Arn
      TopicArn: "arn:aws:sns:us-east-1:955468203539:rescue-prioritization-events-v1"
      # แนะนำให้เปิด RawMessageDelivery เป็น true เพื่อให้รับ JSON ได้ง่ายขึ้น
      RawMessageDelivery: true

  # 3. SNS Topic
  DispatchResultsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: request-dispatch-results-v1

  # 4. REST API Lambda (Sync)
  RestApiHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/rest_handler.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref ManageDispatchTable
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      Events:
        GetDashboard:
          Type: Api
          Properties:
            Path: /
            Method: get
        GetDispatches:
          Type: Api
          Properties:
            Path: /v1/dispatches
            Method: get
        UpdateStatus:
          Type: Api
          Properties:
            Path: /v1/dispatches/{id}/status
            Method: patch

  # 5. Async Worker Lambda (SQS Trigger)
  AsyncWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/async_worker.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref ManageDispatchTable
          TOPIC_ARN: !Ref DispatchResultsTopic
          # MOCK_MODE = True จะไม่เรียก API จริง ใช้สำหรับทดสอบคนเดียว
          MOCK_MODE: "True" 
          TEAM_SERVICE_URL: "http://mock-team-service/v1/teams"
          REQUEST_SERVICE_URL: "http://mock-request-service/v1/requests"
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      Events:
        SQSQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt DispatchCommandsQueue.Arn
            BatchSize: 1

  # 1. สร้าง SQS Queue มารอรับข้อมูลจาก SNS ของเพื่อน
  RecommendationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: RecommendationQueue

  # (สำหรับอนาคต) เมื่อเพื่อนขอ Account ID ให้ส่งเลข AWS Account ID ของท็อปให้เพื่อน
  # และเมื่อเพื่อนให้สิทธิ์แล้ว ค่อยเอาโค้ดนี้มาเปิดใช้งานเพื่อผูก SNS ของเพื่อนเข้า SQS ของเรา
  # RecommendationQueuePolicy:
  #   Type: AWS::SQS::QueuePolicy
  #   Properties:
  #     Queues: [!Ref RecommendationQueue]
  #     PolicyDocument:
  #       Statement:
  #         - Effect: Allow
  #           Principal: "*"
  #           Action: sqs:SendMessage
  #           Resource: !GetAtt RecommendationQueue.Arn
  #           Condition:
  #             ArnEquals:
  #               aws:SourceArn: "arn:aws:sns:us-east-1:337919099389:rescue_recommendation_generated_v1"

  # 2. สร้าง Async Worker (Lambda) สำหรับประมวลผล Recommendation
  RecommendationWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: recommendation_worker.lambda_handler
      Runtime: python3.12
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          TABLE_NAME: !Ref ManageDispatchTable
      Events:
        SQSMessage:
          Type: SQS
          Properties:
            Queue: !GetAtt RecommendationQueue.Arn
            BatchSize: 5