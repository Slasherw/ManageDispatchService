AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12
  Api:
    Cors:
      # อนุญาตให้ Domain อื่นยิงเข้ามาได้
      AllowOrigin: "'*'"
      # 🟢 เพิ่ม PATCH ลงในรายการนี้
      AllowMethods: "'GET,POST,OPTIONS,PATCH'"
      # อนุญาตให้ส่ง Header เหล่านี้เข้ามาได้ (สำคัญสำหรับ Trace ID และ Content-Type)
      AllowHeaders: "'Content-Type,X-Trace-Id,X-Amzn-Trace-Id,Authorization'"


Resources:
  # 1. DynamoDB Table
  ManageDispatchTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ManageDispatchTable
      AttributeDefinitions:
        - AttributeName: dispatchId
          AttributeType: S
        - AttributeName: teamId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: dispatchId
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      GlobalSecondaryIndexes:
        - IndexName: TeamIdIndex
          KeySchema:
            - AttributeName: teamId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5

  # 4. REST API Lambda (Sync)
  RestApiHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/rest_handler.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref ManageDispatchTable
          DISPATCH_TOPIC_ARN: !Ref RescueMissionDispatchedTopic
          TEAM_SERVICE_URL: "https://uuh5csx5hg.execute-api.ap-southeast-1.amazonaws.com/v1/teams"
          REQUEST_SERVICE_URL: "https://xiotbtkj2m.execute-api.ap-southeast-2.amazonaws.com/dev/v1"
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueMissionDispatchedTopic.TopicName
      Events:
        GetDashboard:
          Type: Api
          Properties:
            Path: /
            Method: get
        GetDispatches:
          Type: Api
          Properties:
            Path: /v1/dispatches
            Method: get
        UpdateStatus:
          Type: Api
          Properties:
            Path: /v1/dispatches/{id}/status
            Method: patch

  # 1. สร้าง SQS Queue มารอรับข้อมูลจาก SNS ของเพื่อน (Team Service - Recommendation)
  RecommendationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: RecommendationQueue

  RecommendationQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref RecommendationQueue]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: sqs:SendMessage
            Resource: !GetAtt RecommendationQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: "arn:aws:sns:ap-southeast-1:157975549839:recommendation-generated-topic"
  
  # 2. Recommendation Worker (ตอนนี้เป็นทางเข้าหลักทางเดียวแล้ว)
  RecommendationWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/recommendation_worker.lambda_handler
      Runtime: python3.12
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          TABLE_NAME: !Ref ManageDispatchTable
          TEAM_SERVICE_URL: "https://uuh5csx5hg.execute-api.ap-southeast-1.amazonaws.com/v1/teams"
          REQUEST_SERVICE_URL: "https://xiotbtkj2m.execute-api.ap-southeast-2.amazonaws.com/dev/v1"
      Events:
        SQSMessage:
          Type: SQS
          Properties:
            Queue: !GetAtt RecommendationQueue.Arn
            BatchSize: 5
  
  # 1. สร้าง SNS Topic ของเราเอง (ที่เราเป็นคน Publish)
  RescueMissionDispatchedTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: request-dispatch-v1

  # 🟢 เพิ่มส่วนนี้เพื่อเปิดสิทธิ์ให้เพื่อน (Account 337919099389) มา Subscribe ได้
  RescueMissionDispatchedTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RescueMissionDispatchedTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCrossAccountSubscribe
            Effect: Allow
            Principal:
              # ระบุ Account ID ของเพื่อน
              AWS: 
                - "arn:aws:iam::337919099389:root" # Team
                - "arn:aws:iam::340217571399:root" # MissionProgress
            Action:
              - "sns:Subscribe"
              - "sns:Receive"
            Resource: !Ref RescueMissionDispatchedTopic

  # --- 5. Mission Progress Integration (Async Update) ---

  # 1. SQS สำหรับรับข้อมูลอัปเดตจาก Mission Progress (EventBridge)
  MissionUpdateQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MissionUpdateQueue

  # 2. Policy ให้ EventBridge ส่งข้อความเข้า SQS ได้ และอนุญาตสิทธิ์เพิ่มเติมให้เพื่อน
  MissionUpdateQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref MissionUpdateQueue]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt MissionUpdateQueue.Arn
          - Effect: Allow
            Principal:
              AWS: "arn:aws:iam::340217571399:role/LabRole"
            Action:
              - "sqs:ReceiveMessage"
              - "sqs:DeleteMessage"
              - "sqs:GetQueueAttributes"
            Resource: !GetAtt MissionUpdateQueue.Arn

  # 4. Mission Update Worker (Consumer)
  MissionUpdateWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/mission_update_worker.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref ManageDispatchTable
          TEAM_SERVICE_URL: "https://uuh5csx5hg.execute-api.ap-southeast-1.amazonaws.com/v1/teams"
          REQUEST_SERVICE_URL: "https://xiotbtkj2m.execute-api.ap-southeast-2.amazonaws.com/dev/v1"
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      Events:
        SQSMessage:
          Type: SQS
          Properties:
            Queue: !GetAtt MissionUpdateQueue.Arn
            BatchSize: 1

  # 2. สร้าง SQS สำหรับ Debug (เอาไว้เช็คของ)
  DebugTeamServiceQueue:
    Type: AWS::SQS::Queue

  # 3. ผูก SQS เข้ากับ SNS
  DebugSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref RescueMissionDispatchedTopic
      Endpoint: !GetAtt DebugTeamServiceQueue.Arn
      Protocol: sqs

  DebugTeamServiceQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref DebugTeamServiceQueue]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: "sns.amazonaws.com" # 🟢 อนุญาตให้บริการ SNS ส่งของได้
            Action: "sqs:SendMessage"
            Resource: !GetAtt DebugTeamServiceQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref RescueMissionDispatchedTopic # 🟢 เฉพาะจาก Topic นี้เท่านั้น